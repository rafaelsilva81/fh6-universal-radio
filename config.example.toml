# Example config, copied to `<game>/fh6-radio/config.toml` on first install.
# Everything is editable from the dashboard; you only need to touch this file
# if you prefer hand edits. Windows paths should use TOML literal strings
# (single quotes) so backslashes pass through verbatim:
#
#   music_dir = 'C:\Users\you\Music'

[general]
port              = 8420
ring_buffer_mb    = 4
default_source    = "local_files"     # local_files | youtube_music
fallback_source   = "local_files"

[local_files]
enabled            = true
music_dir          = ''                # blank => set from the dashboard
recursive          = true
shuffle            = true
supported_formats  = ["mp3", "flac", "wav", "ogg", "m4a", "opus"]

[youtube_music]
enabled            = false
cookies_path       = ''                # optional Netscape cookies.txt
yt_dlp_path        = ''                # blank = `yt-dlp` on PATH
ffmpeg_path        = ''                # blank = `ffmpeg`  on PATH
default_playlist   = ""
normalize_volume   = true              # Enable EBU R128 loudness normalization for consistent volume

[audio]
output_gain = 1.00
